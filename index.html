<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BOTÓN MODO -->
<button id="toggleTheme">🌙</button>

<!-- PANTALLAS -->
<div id="home" class="screen active">
  <h1>Mis hábitos</h1>

  <div id="habitList"></div>

  <input type="text" id="habitInput" placeholder="Nuevo hábito...">
  <button class="main-btn" onclick="addHabit()">Agregar</button>
</div>

<div id="stats" class="screen">
  <h1>Estadísticas</h1>
  <p id="statsText"></p>
</div>

<div id="motivation" class="screen">
  <h1>Motivación</h1>
  <div class="card" id="quote"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showScreen('home')">🏠</button>
  <button onclick="showScreen('stats')">📊</button>
  <button onclick="showScreen('motivation')">✨</button>
</div>

<script src="app.js"></script>
</body>
</html>
