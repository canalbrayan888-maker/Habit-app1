<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Pro</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="header">
  <h2>Habit Pro</h2>
  <button id="toggleTheme">🌙</button>
</div>

<div id="home" class="screen active">
  <h3>Hoy</h3>

  <div id="habitList"></div>

  <div class="add-box">
    <input type="text" id="habitInput" placeholder="Nuevo hábito...">
    <button onclick="addHabit()">+</button>
  </div>
</div>

<div id="stats" class="screen">
  <h3>Progreso</h3>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <p id="statsText"></p>
</div>

<div id="motivation" class="screen">
  <h3>Motivación</h3>
  <div class="card big" id="quote"></div>
</div>

<div class="nav">
  <button onclick="showScreen('home')">🏠</button>
  <button onclick="showScreen('stats')">📊</button>
  <button onclick="showScreen('motivation')">✨</button>
</div>

<script src="app.js"></script>

</body>
</html>
